server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Taille max upload (fichiers GPX)
    client_max_body_size 50M;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript;

    # Frontend — SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API → backend (évite les problèmes CORS en prod)
    location /api/ {
        proxy_pass http://geographix_backend:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # WebSockets (tracking live)
    location /ws/ {
        proxy_pass http://geographix_backend:8000/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }

    # JS et CSS — jamais de cache (toujours revalidé)
    location ~* \.(js|css)$ {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";
        add_header Pragma "no-cache";
    }

    # Images et fonts — cache long OK (elles ne changent pas)
    location ~* \.(png|ico|woff2|jpg|svg)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}