<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <script>
    document.documentElement.setAttribute('data-theme', localStorage.getItem('vt_theme') || 'dark');
  </script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#080c10">
  <link rel="icon" href="images/favicon.ico">
  <title>GeoTracer — Contacts</title>
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&family=Exo+2:wght@300;400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/themes.css">
  <style>
    .contacts-grid {
      display: grid;
      grid-template-columns: 1fr 340px;
      gap: 20px;
    }
    @media(max-width:800px) { .contacts-grid { grid-template-columns: 1fr; } }

    /* ── Carte contact ── */
    .contact-card {
      display: flex; align-items: center; gap: 14px;
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 10px; padding: 14px 16px; margin-bottom: 8px;
      transition: border-color 0.2s;
    }
    .contact-card:hover { border-color: var(--accent); }
    .contact-avatar {
      width: 42px; height: 42px; border-radius: 50%; flex-shrink: 0;
      background: linear-gradient(135deg, var(--accent), #0066ff);
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-head); font-size: 18px; font-weight: 800; color: #000;
    }
    .contact-info { flex: 1; min-width: 0; }
    .contact-name {
      font-family: var(--font-head); font-size: 15px; font-weight: 700;
      color: var(--text); letter-spacing: 0.05em;
    }
    .contact-detail {
      font-family: var(--font-mono); font-size: 10px; color: var(--text3);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .contact-actions { display: flex; gap: 6px; flex-shrink: 0; }
    .btn-icon {
      background: var(--bg3); border: 1px solid var(--border2);
      border-radius: 6px; padding: 6px 10px; cursor: pointer;
      font-size: 13px; color: var(--text2); transition: all 0.15s;
    }
    .btn-icon:hover { border-color: var(--accent); color: var(--accent); }
    .btn-icon.danger:hover { border-color: var(--red); color: var(--red); }

    /* ── Formulaire ajout ── */
    .add-contact-form {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 12px; padding: 20px;
      position: sticky; top: 20px;
    }
    .add-contact-title {
      font-family: var(--font-head); font-size: 16px; font-weight: 700;
      color: var(--text); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 16px;
    }
    .form-field { margin-bottom: 12px; }
    .form-label {
      font-family: var(--font-mono); font-size: 9px; color: var(--text3);
      text-transform: uppercase; letter-spacing: 0.12em; margin-bottom: 5px; display: block;
    }
    .form-input {
      width: 100%; background: var(--bg3); border: 1px solid var(--border2);
      border-radius: 6px; padding: 10px 12px; color: var(--text);
      font-family: var(--font-mono); font-size: 12px;
      outline: none; transition: border-color 0.2s; box-sizing: border-box;
    }
    .form-input:focus { border-color: var(--accent); }

    /* ── Liens actifs ── */
    .share-link-card {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 10px; padding: 14px 16px; margin-bottom: 8px;
    }
    .share-link-label {
      font-family: var(--font-head); font-size: 13px; font-weight: 700;
      color: var(--text); margin-bottom: 4px;
    }
    .share-link-meta {
      font-family: var(--font-mono); font-size: 9px; color: var(--text3);
      margin-bottom: 8px;
    }
    .share-link-url {
      font-family: var(--font-mono); font-size: 10px; color: var(--accent);
      background: var(--bg3); border-radius: 4px; padding: 6px 10px;
      word-break: break-all; cursor: pointer; margin-bottom: 8px;
    }
    .share-link-url:hover { text-decoration: underline; }

    /* ── Modal partage ── */
    .share-modal-overlay {
      position: fixed; inset: 0; z-index: 9000;
      background: rgba(0,0,0,0.75); backdrop-filter: blur(4px);
      display: flex; align-items: center; justify-content: center; padding: 20px;
    }
    .share-modal {
      background: var(--bg2); border: 1px solid rgba(0,212,255,0.2);
      border-radius: 14px; padding: 28px; max-width: 480px; width: 100%;
      box-shadow: 0 24px 64px rgba(0,0,0,0.6);
    }
    .share-modal-title {
      font-family: var(--font-head); font-size: 20px; font-weight: 800;
      color: var(--accent); letter-spacing: 0.08em; text-transform: uppercase;
      margin-bottom: 20px;
    }
    .duration-grid {
      display: grid; grid-template-columns: repeat(5,1fr); gap: 6px; margin-bottom: 16px;
    }
    .duration-btn {
      background: var(--bg3); border: 1px solid var(--border2);
      border-radius: 6px; padding: 8px 4px; text-align: center;
      font-family: var(--font-mono); font-size: 11px; color: var(--text2);
      cursor: pointer; transition: all 0.15s;
    }
    .duration-btn:hover, .duration-btn.active {
      border-color: var(--accent); color: var(--accent);
      background: rgba(0,212,255,0.08);
    }
    .contact-checkbox-row {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px; border-radius: 8px;
      background: var(--bg3); margin-bottom: 6px; cursor: pointer;
    }
    .contact-checkbox-row:hover { background: var(--bg4, #1a2030); }
    .contact-checkbox-row input[type=checkbox] { accent-color: var(--accent); width:16px; height:16px; }
  </style>
</head>
<body>

<div id="sidebar"></div>
<div class="main">
  <div id="topbar"></div>
  <div class="page-content">

    <div class="section-header" style="margin-bottom:20px">
      <div class="section-title">Contacts & Partage</div>
      <button class="btn btn-primary" onclick="Contacts.openShareModal()">🔗 Nouveau lien de partage</button>
    </div>

    <div class="contacts-grid">

      <!-- Liste contacts -->
      <div>
        <div style="font-family:var(--font-head);font-size:13px;font-weight:700;
          color:var(--text2);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:12px">
          👥 Mes contacts
        </div>
        <div id="contactsList"></div>
        <div id="contactsEmpty" style="display:none;font-family:var(--font-mono);
          font-size:12px;color:var(--text3);padding:20px 0">
          Aucun contact — ajoute des proches pour partager tes sorties en 2 clics.
        </div>

        <!-- Liens actifs -->
        <div style="font-family:var(--font-head);font-size:13px;font-weight:700;
          color:var(--text2);letter-spacing:0.08em;text-transform:uppercase;
          margin-top:28px;margin-bottom:12px">
          🔗 Liens de partage actifs
        </div>
        <div id="sharesList"></div>
        <div id="sharesEmpty" style="display:none;font-family:var(--font-mono);
          font-size:12px;color:var(--text3);padding:20px 0">
          Aucun lien actif.
        </div>
      </div>

      <!-- Formulaire ajout contact -->
      <div>
        <div class="add-contact-form">
          <div class="add-contact-title">➕ Ajouter un contact</div>
          <div class="form-field">
            <label class="form-label">Nom</label>
            <input class="form-input" id="newContactName" placeholder="Username Dupont">
          </div>
          <div class="form-field">
            <label class="form-label">Email</label>
            <input class="form-input" id="newContactEmail" type="email" placeholder="username@example.com">
          </div>
          <div class="form-field">
            <label class="form-label">Téléphone (optionnel)</label>
            <input class="form-input" id="newContactPhone" type="tel" placeholder="+33 6 12 34 56 78">
          </div>
          <button class="btn btn-primary" style="width:100%;margin-top:4px"
            onclick="Contacts.addContact()">Ajouter</button>
        </div>
      </div>

    </div>
  </div>
</div>

<div id="bottom-nav"></div>
<div id="toast"></div>

<!-- Modal partage -->
<div id="shareModal" style="display:none">
  <div class="share-modal-overlay" onclick="Contacts.closeShareModal()">
    <div class="share-modal" onclick="event.stopPropagation()">
      <div class="share-modal-title">🔗 Partager une sortie</div>

      <div class="form-field">
        <label class="form-label">Label du lien</label>
        <input class="form-input" id="shareLabel" placeholder="Tour de Corse 2026">
      </div>

      <div class="form-field">
        <label class="form-label" style="margin-bottom:8px">Durée de validité</label>
        <div class="duration-grid">
          <div class="duration-btn" onclick="Contacts.setDuration('1d',this)">1 jour</div>
          <div class="duration-btn" onclick="Contacts.setDuration('3d',this)">3 jours</div>
          <div class="duration-btn active" onclick="Contacts.setDuration('7d',this)">1 semaine</div>
          <div class="duration-btn" onclick="Contacts.setDuration('14d',this)">2 sem.</div>
          <div class="duration-btn" onclick="Contacts.setDuration('30d',this)">1 mois</div>
        </div>
      </div>

      <div class="form-field">
        <label class="form-label" style="margin-bottom:8px">Envoyer à</label>
        <div id="shareContactsList"></div>
      </div>

      <div id="shareLinkResult" style="display:none;margin-bottom:16px">
        <label class="form-label">Lien généré</label>
        <div class="share-link-url" id="shareLinkUrl" onclick="Contacts.copyShareLink()"></div>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <button class="btn btn-primary" onclick="Contacts.copyShareLink()">📋 Copier</button>
          <button class="btn btn-ghost" onclick="Contacts.sendByEmail()">📧 Email</button>
          <button class="btn btn-ghost" onclick="Contacts.sendBySms()">💬 SMS</button>
          <button class="btn btn-ghost" onclick="Contacts.shareNative()" id="btnNativeShare" style="display:none">
            ↗ Partager
          </button>
        </div>
      </div>

      <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:8px">
        <button class="btn btn-ghost" onclick="Contacts.closeShareModal()">Fermer</button>
        <button class="btn btn-primary" id="btnGenerateLink" onclick="Contacts.generateLink()">
          Générer le lien
        </button>
      </div>
    </div>
  </div>
</div>

<script src="js/theme.js"></script>
<script src="js/utils.js"></script>
<script src="js/auth.js"></script>
<script src="js/api.js"></script>
<script src="js/components.js"></script>
<script src="js/contacts.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', async () => {
    await Components.init('contacts', 'Contacts & Partage');
    Contacts.load();
  });
</script>
</body>
</html>
