<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <script>
    document.documentElement.setAttribute('data-theme', localStorage.getItem('vt_theme') || 'dark');
  </script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#080c10">
  <link rel="icon" href="images/favicon.ico">
  <title>GeoTracer — Contacts</title>
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&family=Exo+2:wght@300;400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/themes.css">
  <link rel="stylesheet" href="css/contacts.css">
  <!-- iOS PWA -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="GeoTracer">
  <link rel="apple-touch-icon" href="images/apple-touch-icon.png">
  <link rel="apple-touch-icon" sizes="120x120" href="images/apple-touch-icon-120.png">
  <link rel="apple-touch-icon" sizes="152x152" href="images/apple-touch-icon-152.png">
  <link rel="apple-touch-icon" sizes="167x167" href="images/apple-touch-icon-167.png">
  <link rel="apple-touch-icon" sizes="180x180" href="images/apple-touch-icon-180.png">
  <link rel="apple-touch-startup-image" media="(device-width: 430px) and (device-height: 932px) and (-webkit-device-pixel-ratio: 3)" href="images/splash-1290x2796.png">
  <link rel="apple-touch-startup-image" media="(device-width: 393px) and (device-height: 852px) and (-webkit-device-pixel-ratio: 3)" href="images/splash-1179x2556.png">
  <link rel="apple-touch-startup-image" media="(device-width: 390px) and (device-height: 844px) and (-webkit-device-pixel-ratio: 3)" href="images/splash-1170x2532.png">
  <link rel="apple-touch-startup-image" media="(device-width: 360px) and (device-height: 640px) and (-webkit-device-pixel-ratio: 3)" href="images/splash-1080x1920.png">
</head>
<body>

<div id="sidebar"></div>
<div class="main">
  <div id="topbar"></div>
  <div class="page-content">

    <div class="section-header" style="margin-bottom:20px">
      <div class="section-title">Contacts & Partage</div>
      <button class="btn btn-primary" onclick="Contacts.openShareModal()">🔗 Nouveau lien de partage</button>
    </div>

    <div class="contacts-grid">

      <!-- Liste contacts -->
      <div>
        <div style="font-family:var(--font-head);font-size:13px;font-weight:700;
          color:var(--text2);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:12px">
          👥 Mes contacts
        </div>
        <div id="contactsList"></div>
        <div id="contactsEmpty" style="display:none;font-family:var(--font-mono);
          font-size:12px;color:var(--text3);padding:20px 0">
          Aucun contact — ajoute des proches pour partager tes sorties en 2 clics.
        </div>

        <!-- Liens actifs -->
        <div style="font-family:var(--font-head);font-size:13px;font-weight:700;
          color:var(--text2);letter-spacing:0.08em;text-transform:uppercase;
          margin-top:28px;margin-bottom:12px">
          🔗 Liens de partage actifs
        </div>
        <div id="sharesList"></div>
        <div id="sharesEmpty" style="display:none;font-family:var(--font-mono);
          font-size:12px;color:var(--text3);padding:20px 0">
          Aucun lien actif.
        </div>
      </div>

      <!-- Formulaire ajout contact -->
      <div>
        <div class="add-contact-form">
          <div class="add-contact-title">➕ Ajouter un contact</div>
          <div class="form-field">
            <label class="form-label">Nom</label>
            <input class="form-input" id="newContactName" placeholder="Username name">
          </div>
          <div class="form-field">
            <label class="form-label">Email</label>
            <input class="form-input" id="newContactEmail" type="email" placeholder="username@example.com">
          </div>
          <div class="form-field">
            <label class="form-label">Téléphone (optionnel)</label>
            <input class="form-input" id="newContactPhone" type="tel" placeholder="+33 6 12 34 56 78">
          </div>
          <button class="btn btn-primary" style="width:100%;margin-top:4px"
            onclick="Contacts.addContact()">Ajouter</button>
        </div>
      </div>

    </div>
  </div>
</div>

<div id="bottom-nav"></div>
<div id="toast"></div>

<!-- Modal partage -->
<div id="shareModal" style="display:none">
  <div class="share-modal-overlay" onclick="Contacts.closeShareModal()">
    <div class="share-modal" onclick="event.stopPropagation()">
      <div class="share-modal-title">🔗 Partager une sortie</div>

      <div class="form-field">
        <label class="form-label">Label du lien</label>
        <input class="form-input" id="shareLabel" placeholder="Tour de Corse 2026">
      </div>

      <div class="form-field">
        <label class="form-label" style="margin-bottom:8px">Durée de validité</label>
        <div class="duration-grid">
          <div class="duration-btn" onclick="Contacts.setDuration('1d',this)">1 jour</div>
          <div class="duration-btn" onclick="Contacts.setDuration('3d',this)">3 jours</div>
          <div class="duration-btn active" onclick="Contacts.setDuration('7d',this)">1 semaine</div>
          <div class="duration-btn" onclick="Contacts.setDuration('14d',this)">2 sem.</div>
          <div class="duration-btn" onclick="Contacts.setDuration('30d',this)">1 mois</div>
        </div>
      </div>

      <div class="form-field">
        <label class="form-label" style="margin-bottom:8px">Envoyer à</label>
        <div id="shareContactsList"></div>
      </div>

      <div id="shareLinkResult" style="display:none;margin-bottom:16px">
        <label class="form-label">Lien généré</label>
        <div class="share-link-url" id="shareLinkUrl" onclick="Contacts.copyShareLink()"></div>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <button class="btn btn-primary" onclick="Contacts.copyShareLink()">📋 Copier</button>
          <button class="btn btn-ghost" onclick="Contacts.sendByEmail()">📧 Email</button>
          <button class="btn btn-ghost" onclick="Contacts.sendBySms()">💬 SMS</button>
          <button class="btn btn-ghost" onclick="Contacts.shareNative()" id="btnNativeShare" style="display:none">
            ↗ Partager
          </button>
        </div>
      </div>

      <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:8px">
        <button class="btn btn-ghost" onclick="Contacts.closeShareModal()">Fermer</button>
        <button class="btn btn-primary" id="btnGenerateLink" onclick="Contacts.generateLink()">
          Générer le lien
        </button>
      </div>
    </div>
  </div>
</div>

<script src="js/theme.js"></script>
<script src="js/utils.js"></script>
<script src="js/auth.js"></script>
<script src="js/api.js"></script>
<script src="js/components.js"></script>
<script src="js/contacts.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', async () => {
    await Components.init('contacts', 'Contacts & Partage');
    Contacts.load();
  });
</script>
</body>
</html>
