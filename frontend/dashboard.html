<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <script>
    document.documentElement.setAttribute('data-theme', localStorage.getItem('vt_theme') || 'dark');
  </script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="author" content="Laurent Jouron">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <!-- SEO & Partage -->
  <meta name="description" content="GeoTracer — Suivi GPS de tes sorties vélo en temps réel">
  <meta name="robots" content="noindex, nofollow">

  <!-- Open Graph (aperçu WhatsApp, iMessage...) -->
  <meta property="og:site_name" content="GeoTracer">
  <meta property="og:title" content="GeoTracer — Dashboard">
  <meta name="description" content="GeoTracer — Tableau de bord de vos sorties">
  <meta property="og:image" content="https://geotracer.laurentjouron.dev/images/apple-touch-icon-180.png">
  <meta property="og:url" content="https://geotracer.laurentjouron.dev">
  <meta property="og:type" content="website">
  <meta property="og:locale" content="fr_FR">

  <meta name="theme-color" content="#080c10">
  <link rel="icon" href="images/favicon.ico">
  <title>GeoTracer — Dashboard</title>
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&family=Exo+2:wght@300;400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/themes.css">
  <!-- iOS PWA -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="GeoTracer">
  <link rel="apple-touch-icon" href="images/apple-touch-icon.png">
  <link rel="apple-touch-icon" sizes="120x120" href="images/apple-touch-icon-120.png">
  <link rel="apple-touch-icon" sizes="152x152" href="images/apple-touch-icon-152.png">
  <link rel="apple-touch-icon" sizes="167x167" href="images/apple-touch-icon-167.png">
  <link rel="apple-touch-icon" sizes="180x180" href="images/apple-touch-icon-180.png">
  <link rel="apple-touch-startup-image" media="(device-width: 430px) and (device-height: 932px) and (-webkit-device-pixel-ratio: 3)" href="images/splash-1290x2796.png">
  <link rel="apple-touch-startup-image" media="(device-width: 393px) and (device-height: 852px) and (-webkit-device-pixel-ratio: 3)" href="images/splash-1179x2556.png">
  <link rel="apple-touch-startup-image" media="(device-width: 390px) and (device-height: 844px) and (-webkit-device-pixel-ratio: 3)" href="images/splash-1170x2532.png">
  <link rel="apple-touch-startup-image" media="(device-width: 360px) and (device-height: 640px) and (-webkit-device-pixel-ratio: 3)" href="images/splash-1080x1920.png">
</head>
<body>

<div id="sidebar"></div>

<div class="main">
  <div id="topbar"></div>
  <div class="page-content">

    <div class="dash-hero">
      <div class="dash-hero-name">GeoTracer</div>
      <div class="dash-hero-label" id="heroLabel">Bonjour</div>
    </div>

    <div class="kpi-row">
      <div class="kpi-card blue">
        <div class="kpi-icon">📏</div>
        <div class="kpi-label">Distance totale</div>
        <div class="kpi-value" id="kpiDist">—<span class="kpi-unit">km</span></div>
      </div>
      <div class="kpi-card orange">
        <div class="kpi-icon">🏁</div>
        <div class="kpi-label">Sorties</div>
        <div class="kpi-value" id="kpiRides">—</div>
      </div>
      <div class="kpi-card green">
        <div class="kpi-icon">⚡</div>
        <div class="kpi-label">Vitesse moy.</div>
        <div class="kpi-value" id="kpiSpeed">—<span class="kpi-unit">km/h</span></div>
      </div>
      <div class="kpi-card yellow">
        <div class="kpi-icon">⬆️</div>
        <div class="kpi-label">Dénivelé total</div>
        <div class="kpi-value" id="kpiElev">—<span class="kpi-unit">m</span></div>
      </div>
    </div>

    <div class="section-header">
      <div class="section-title">Sorties récentes</div>
      <a class="btn btn-ghost" href="activities.html">Toutes →</a>
    </div>
    <div class="activity-list" id="recentList"></div>

  </div>
</div>

<div id="bottom-nav"></div>
<div id="toast"></div>

<script src="js/theme.js"></script>
<script src="js/utils.js"></script>
<script src="js/auth.js"></script>
<script src="js/api.js"></script>
<script src="js/components.js"></script>
<script src="js/dashboard.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', async () => {
    await Components.init('dashboard', 'Dashboard');
    Dashboard.load();
  });
</script>
</body>
</html>
