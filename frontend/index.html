<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <script>
    document.documentElement.setAttribute('data-theme', localStorage.getItem('vt_theme') || 'dark');
  </script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="author" content="Laurent Jouron">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <!-- SEO & Partage -->
  <meta name="description" content="GeoTracer — Suivi GPS de tes sorties vélo en temps réel">
  <meta name="robots" content="noindex, nofollow">

  <!-- Open Graph (aperçu WhatsApp, iMessage...) -->
  <meta property="og:site_name" content="GeoTracer">
  <meta property="og:title" content="GeoTracer — Connexion">
  <meta name="description" content="GeoTracer — Connectez-vous pour suivre vos sorties vélo">
  <meta property="og:image" content="https://geotracer.laurentjouron.dev/images/apple-touch-icon-180.png">
  <meta property="og:url" content="https://geotracer.laurentjouron.dev">
  <meta property="og:type" content="website">
  <meta property="og:locale" content="fr_FR">

  <meta name="theme-color" content="#080c10">
  <link rel="icon" href="images/favicon.ico">
  <title>GeoTracer — Connexion</title>
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&family=Exo+2:wght@300;400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/themes.css">
  <!-- iOS PWA -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="GeoTracer">
  <link rel="apple-touch-icon" href="images/apple-touch-icon.png">
  <link rel="apple-touch-icon" sizes="120x120" href="images/apple-touch-icon-120.png">
  <link rel="apple-touch-icon" sizes="152x152" href="images/apple-touch-icon-152.png">
  <link rel="apple-touch-icon" sizes="167x167" href="images/apple-touch-icon-167.png">
  <link rel="apple-touch-icon" sizes="180x180" href="images/apple-touch-icon-180.png">
  <link rel="apple-touch-startup-image" media="(device-width: 430px) and (device-height: 932px) and (-webkit-device-pixel-ratio: 3)" href="images/splash-1290x2796.png">
  <link rel="apple-touch-startup-image" media="(device-width: 393px) and (device-height: 852px) and (-webkit-device-pixel-ratio: 3)" href="images/splash-1179x2556.png">
  <link rel="apple-touch-startup-image" media="(device-width: 390px) and (device-height: 844px) and (-webkit-device-pixel-ratio: 3)" href="images/splash-1170x2532.png">
  <link rel="apple-touch-startup-image" media="(device-width: 360px) and (device-height: 640px) and (-webkit-device-pixel-ratio: 3)" href="images/splash-1080x1920.png">
</head>
<body class="auth-body">

<div class="auth-overlay">
  <div class="auth-card">

    <div class="auth-logo">🚴</div>
    <div class="auth-title">GeoTracer</div>
    <div class="auth-sub">Suivi GPS pour sorties vélo</div>

    <input class="auth-api-input" id="apiUrlAuth"
      value="https://geoapi.laurentjouron.dev" placeholder="URL du backend">

    <div class="auth-tabs">
      <button class="auth-tab active" data-tab="login"    onclick="Auth.switchTab('login')">Connexion</button>
      <button class="auth-tab"        data-tab="register" onclick="Auth.switchTab('register')">Inscription</button>
    </div>

    <div class="auth-error" id="authError"></div>

    <!-- Login -->
    <div class="auth-form active" id="form-login">
      <div class="auth-field">
        <label>Nom d'utilisateur</label>
        <input id="loginUsername" type="text" placeholder="laurent" autocomplete="username">
      </div>
      <div class="auth-field">
        <label>Mot de passe</label>
        <input id="loginPassword" type="password" placeholder="••••••••" autocomplete="current-password">
      </div>
      <button class="auth-submit" id="loginBtn" onclick="Auth.submitLogin()">
        Se connecter
      </button>
    </div>

    <!-- Register -->
    <div class="auth-form" id="form-register">
      <div class="auth-field">
        <label>Nom d'utilisateur</label>
        <input id="regUsername" type="text" placeholder="laurent" autocomplete="username">
      </div>
      <div class="auth-field">
        <label>Email</label>
        <input id="regEmail" type="email" placeholder="laurent@example.com" autocomplete="email">
      </div>
      <div class="auth-field">
        <label>Mot de passe</label>
        <input id="regPassword" type="password" placeholder="8 caractères minimum" autocomplete="new-password">
      </div>
      <div class="auth-field">
        <label>Confirmer le mot de passe</label>
        <input id="regConfirm" type="password" placeholder="••••••••" autocomplete="new-password">
      </div>
      <button class="auth-submit" id="registerBtn" onclick="Auth.submitRegister()">
        S'inscrire
      </button>
    </div>

  </div>
</div>

<div id="toast"></div>

<script src="js/theme.js"></script>
<script src="js/utils.js"></script>
<script src="js/auth.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', () => {
    Auth.initLoginPage();
  });
</script>
</body>
</html>
