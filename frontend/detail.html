<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <script>
    document.documentElement.setAttribute('data-theme', localStorage.getItem('vt_theme') || 'dark');
  </script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="author" content="Laurent Jouron">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <!-- SEO & Partage -->
  <meta name="description" content="GeoTracer — Suivi GPS de tes sorties vélo en temps réel">
  <meta name="robots" content="noindex, nofollow">

  <!-- Open Graph (aperçu WhatsApp, iMessage...) -->
  <meta property="og:site_name" content="GeoTracer">
  <meta property="og:title" content="GeoTracer — Détail sortie">
  <meta name="description" content="GeoTracer — Détail et statistiques de la sortie">
  <meta property="og:image" content="https://geotracer.laurentjouron.dev/images/apple-touch-icon-180.png">
  <meta property="og:url" content="https://geotracer.laurentjouron.dev">
  <meta property="og:type" content="website">
  <meta property="og:locale" content="fr_FR">

  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#080c10">
  <link rel="icon" href="images/favicon.ico">
  <title>GeoTracer — Détail sortie</title>
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&family=Exo+2:wght@300;400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/style-detail.css">
  <link rel="stylesheet" href="css/themes.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
  <script src="https://cdn.plot.ly/plotly-2.30.0.min.js"></script>
  <!-- iOS PWA -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="GeoTracer">
  <link rel="apple-touch-icon" href="images/apple-touch-icon.png">
  <link rel="apple-touch-icon" sizes="120x120" href="images/apple-touch-icon-120.png">
  <link rel="apple-touch-icon" sizes="152x152" href="images/apple-touch-icon-152.png">
  <link rel="apple-touch-icon" sizes="167x167" href="images/apple-touch-icon-167.png">
  <link rel="apple-touch-icon" sizes="180x180" href="images/apple-touch-icon-180.png">
  <link rel="apple-touch-startup-image" media="(device-width: 430px) and (device-height: 932px) and (-webkit-device-pixel-ratio: 3)" href="images/splash-1290x2796.png">
  <link rel="apple-touch-startup-image" media="(device-width: 393px) and (device-height: 852px) and (-webkit-device-pixel-ratio: 3)" href="images/splash-1179x2556.png">
  <link rel="apple-touch-startup-image" media="(device-width: 390px) and (device-height: 844px) and (-webkit-device-pixel-ratio: 3)" href="images/splash-1170x2532.png">
  <link rel="apple-touch-startup-image" media="(device-width: 360px) and (device-height: 640px) and (-webkit-device-pixel-ratio: 3)" href="images/splash-1080x1920.png">
</head>
<body>

<div id="sidebar"></div>

<div class="main">
  <div id="topbar"></div>
  <div class="page-content">

    <!-- En-tête -->
    <div class="detail-topbar">
      <a class="btn btn-ghost" href="activities.html">← Retour</a>
      <div style="flex:1">
        <div class="detail-heading" id="dTitle">—</div>
        <div class="detail-subhead" id="dDate">—</div>
      </div>
      <a id="dExport" href="#" class="btn btn-ghost">⬇ GPX</a>
      <button class="btn btn-ghost" id="dEnrichBtn" style="display:none"
        onclick="Detail.promptEnrichGpx()">⬆ Enrichir GPX</button>
      <input type="file" id="dGpxInput" accept=".gpx" style="display:none"
        onchange="Detail.enrichWithGpx(this.files[0])">
    </div>

    <!-- Bande de stats -->
    <div class="stats-band" id="dStats"></div>

    <!-- Carte Leaflet -->
    <div class="detail-map-wrap">
      <div class="detail-map-header">
        <div class="title">Tracé GPS</div>
        <button class="map-fullscreen-btn" onclick="Detail.toggleFullscreen()">⛶ Plein écran</button>
      </div>
      <div id="detailMap">
        <div id="mapLoader" style="
          display:flex; align-items:center; justify-content:center;
          height:480px; flex-direction:column; gap:12px; color:var(--text3);
          font-family:var(--font-mono); font-size:13px;">
          <div style="font-size:32px">🗺</div>
          Chargement du tracé...
        </div>
      </div>
      <div class="map-legend" id="mapLegend" style="display:none">
        <div class="map-legend-item">
          <div class="map-legend-line" style="background:var(--accent)"></div>
          <span>Tracé GPS</span>
        </div>
        <div class="map-legend-item">
          <div class="map-legend-dot" style="background:var(--green)"></div>
          <span>Départ</span>
        </div>
        <div class="map-legend-item">
          <div class="map-legend-dot" style="background:var(--red)"></div>
          <span>Arrivée</span>
        </div>
      </div>
    </div>

    <!-- Graphiques -->
    <div class="detail-grid">
      <div class="chart-card">
        <div class="chart-card-title">Vitesse km/h</div>
        <div id="chartSpeed" style="height:220px"></div>
      </div>
      <div class="chart-card">
        <div class="chart-card-title">Altitude m</div>
        <div id="chartAlt" style="height:220px"></div>
      </div>
    </div>
    <div class="detail-grid">
      <div class="chart-card" id="chartHRCard">
        <div class="chart-card-title">❤️ Fréquence cardiaque bpm</div>
        <div id="chartHR" style="height:220px"></div>
      </div>
    </div>

  </div>
</div>

<div id="bottom-nav"></div>
<div id="toast"></div>

<script src="js/theme.js"></script>
<script src="js/utils.js"></script>
<script src="js/auth.js"></script>
<script src="js/api.js"></script>
<script src="js/components.js"></script>
<script src="js/charts.js"></script>
<script src="js/detail.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', async () => {
    await Components.init('activities', 'Détail sortie');
    Detail.load();
  });
</script>
</body>
</html>
