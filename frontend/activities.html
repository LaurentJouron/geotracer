<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <script>
    document.documentElement.setAttribute('data-theme', localStorage.getItem('vt_theme') || 'dark');
  </script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#080c10">
  <link rel="icon" href="images/favicon.ico">
  <title>GeoTracer — Sorties</title>
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&family=Exo+2:wght@300;400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/themes.css">
</head>
<body>

<div id="sidebar"></div>

<div class="main">
  <div id="topbar"></div>
  <div class="page-content">
    <div class="section-header">
      <div class="section-title">Toutes les sorties</div>
      <button class="btn btn-primary" onclick="Activities.loadList()">↺ Actualiser</button>
    </div>
    <div class="activity-list" id="allList"></div>
    <div class="empty" id="emptyActivities" style="display:none">
      <div class="empty-icon">🚴</div>
      <div class="empty-text">Aucune sortie enregistrée</div>
      <a class="btn btn-primary" href="tracker.html">Démarrer une sortie</a>
    </div>
  </div>
</div>

<div id="bottom-nav"></div>
<div id="toast"></div>

<script src="js/theme.js"></script>
<script src="js/utils.js"></script>
<script src="js/auth.js"></script>
<script src="js/api.js"></script>
<script src="js/components.js"></script>
<script src="js/activities.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', async () => {
    await Components.init('activities', 'Mes sorties');
    Activities.loadList();
  });
</script>
</body>
</html>
