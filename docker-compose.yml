version: '3.8'

services:

  db:
    image: postgis/postgis:15-3.3
    container_name: geographix_db
    environment:
      POSTGRES_DB: geographix
      POSTGRES_USER: geo
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - /volume1/docker/geotracer/pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U geo -d geographix"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: geographix_redis
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: geographix_backend
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      SECRET_KEY: ${SECRET_KEY}
      REDIS_URL: ${REDIS_URL}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  frontend:
    image: nginx:alpine
    container_name: geographix_frontend
    volumes:
      - /volume1/docker/geotracer/frontend:/usr/share/nginx/html:ro
      - /volume1/docker/geotracer/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
